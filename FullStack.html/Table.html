<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablecreation</title>
</head>
<body>
    <table border="black">
        <caption><b>Student information</b></caption>
        <!--semantic in table:-> -->
        <!-- Table header-->
         <thead>
            <tr>
                <!-- using table attributes cover tw row or column in a single -->
             <th rowspan="2">Name</th>
             <th rowspan="2"">Enrollment</th>
             <th rowspan="2">college</th>
             <th colspan="2">Total</th>
            </tr>
            <tr>
             <th>marks</th>
             <th>Percent</th>
            </tr>
        </thead>
        <!-- Table Body-->
         <tbody>
            <tr>
                <td>Ambika</td>
                <td>1175</td>
                <td>pit</td>
                <td>86</td>
                <td>86%</td>
             </tr>
            <tr>
             <td>Saurabh</td>
             <td>9870</td>
             <td>pit</td>
             <td>90</td>
             <td>90%</td>
             
            </tr>
        </tbody>
        <!-- Table Footer-->
    </table>
</body>
</html>
