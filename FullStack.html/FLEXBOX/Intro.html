<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
</head>
<body>
    <div style=" height: 400px; border: 2px solid black; display:flex; justify-content: baseline; justify-content: flex-start; flex-wrap: wrap-reverse; justify-content: flex-start; " class="container">
        <div style="background-color: red;  border: 2px solid black; text-align: center; height: 200px;">red</div>
        <div style="background-color: orange;  border: 2px solid black; text-align: center; height: 200px;">orange</div>
        <div style="background-color: skyblue;  border: 2px solid black; text-align: center; height: 200px; width: 150px; flex-grow: 2; align-self: stretch;">sky blue</div>
        <div style="background-color: blue;  border: 2px solid black; text-align: center; height: 200px;">blue</div>
        <div style="background-color: pink;  border: 2px solid black; text-align: center; height: 200px;">pink</div>
        <div style="background-color: yellow;  border: 2px solid black; text-align: center; height: 200px;">yellow</div>
        <div style="background-color: green;  border: 2px solid black; text-align: center; height: 200px;">green</div>
    </div>
</body>
</html>
