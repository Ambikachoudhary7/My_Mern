<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <form>
        <h1 style="text-align: center; color: aqua;" >Google Internship</h1>
        <div class="mb-3">
            <label for="username" class="form-label">Enter Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="Enter email">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" placeholder="Password" class="form-control">
        </div>
        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <input type="text" id="address" class="form-control" placeholder="Address">
        </div>
        <div class="mb-3">
            <label for="number" class="form-label">Phone</label>
            <input type="number" id="number" class="form-control" placeholder="Mobile Number">
        </div>
        <div class="mb-3">
           <select class="form-select" aria-label="Default select example">
                <option selected>Open this select menu</option>
                <option value="1">B.Tech</option>
                <option value="2">M.Tech</option>
                <option value="3">BCA</option>
                <option value="4">B.Sc</option>
            </select>
        </div>
        <div class="mb-3 form-check">
                <label for="check" class="form-check-label">Are You sure to fill</label>
                <input type="checkbox" class="form-check-input" id="check">
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
            <label class="form-check-label" for="radioDefault1">Ebaled</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
            <label class="form-check-label" for="radioDefault2">Not Ebaled</label>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
